name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Instalar dependências frontend
        working-directory: apps/desktop
        run: pnpm install

      - name: Build e assinar instalador
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles nsis

      - name: Extrair versão da tag
        id: ver
        run: echo "v=$('${{ github.ref_name }}'.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - name: Criar GitHub Release com instaladores
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/bundle/nsis/TkSpeed_*_x64-setup.exe
            target/release/bundle/nsis/TkSpeed_*_x64-setup.nsis.zip
            target/release/bundle/nsis/TkSpeed_*_x64-setup.nsis.zip.sig

      - name: Ler assinatura gerada
        id: sig
        run: |
          $v = "${{ steps.ver.outputs.v }}"
          $sig = Get-Content "target/release/bundle/nsis/TkSpeed_${v}_x64-setup.nsis.zip.sig" -Raw
          echo "value=$($sig.Trim())" >> $env:GITHUB_OUTPUT

      - name: Checkout site TkSpeed
        uses: actions/checkout@v4
        with:
          repository: MatheusPenn4/site-tkspeed
          token: ${{ secrets.SITE_REPO_TOKEN }}
          path: site

      - name: Atualizar update.json no site
        run: |
          $v = "${{ steps.ver.outputs.v }}"
          $sig = "${{ steps.sig.outputs.value }}"
          $date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $repo = "${{ github.repository }}"
          $url = "https://github.com/${repo}/releases/download/v${v}/TkSpeed_${v}_x64-setup.nsis.zip"
          $json = Get-Content "site/public/update.json" | ConvertFrom-Json
          $json.version = $v
          $json.pub_date = $date
          $json.platforms.'windows-x86_64'.signature = $sig
          $json.platforms.'windows-x86_64'.url = $url
          $json | ConvertTo-Json -Depth 10 | Out-File "site/public/update.json" -Encoding utf8NoBOM

      - name: Commit e push no site → dispara Vercel redeploy
        working-directory: site
        run: |
          git config user.name "TkSpeed Bot"
          git config user.email "bot@tkspeed.com"
          git add public/update.json
          git commit -m "chore: release v${{ steps.ver.outputs.v }}"
          git push
